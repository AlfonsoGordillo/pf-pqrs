<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}PQRS AI{% endblock %} — Projects Factory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{background:#070711;font-family:'Inter',system-ui,sans-serif}
    ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
    .sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;color:#94a3b8;font-size:14px;font-weight:500;transition:all .15s}
    .sidebar-link:hover,.sidebar-link.active{background:rgba(99,102,241,.15);color:#818cf8}
    .card{background:#0f172a;border:1px solid rgba(255,255,255,.07);border-radius:12px}
    .badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600}
    /* Type badges */
    .badge-petition{background:rgba(59,130,246,.12);color:#60a5fa}
    .badge-complaint{background:rgba(239,68,68,.12);color:#f87171}
    .badge-claim{background:rgba(249,115,22,.12);color:#fb923c}
    .badge-suggestion{background:rgba(34,197,94,.12);color:#4ade80}
    /* Status badges */
    .badge-open{background:rgba(59,130,246,.12);color:#60a5fa}
    .badge-in_progress{background:rgba(249,115,22,.12);color:#fb923c}
    .badge-resolved{background:rgba(34,197,94,.12);color:#4ade80}
    .badge-closed{background:rgba(100,116,139,.12);color:#94a3b8}
    .badge-escalated{background:rgba(239,68,68,.15);color:#f87171}
    /* Priority badges */
    .badge-low{background:rgba(100,116,139,.12);color:#94a3b8}
    .badge-medium{background:rgba(59,130,246,.12);color:#60a5fa}
    .badge-high{background:rgba(249,115,22,.12);color:#fb923c}
    .badge-critical{background:rgba(239,68,68,.15);color:#f87171}
    /* Sentiment */
    .badge-positive{background:rgba(34,197,94,.12);color:#4ade80}
    .badge-neutral{background:rgba(100,116,139,.12);color:#94a3b8}
    .badge-negative{background:rgba(249,115,22,.12);color:#fb923c}
    .badge-very_negative{background:rgba(239,68,68,.15);color:#f87171}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;transition:opacity .15s}
    .btn-primary:hover{opacity:.9}
    .btn-ai{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:500;width:100%;text-align:left;transition:all .15s;cursor:pointer}
    .btn-ai:hover{background:rgba(99,102,241,.2)}
    .ai-result{background:#0a0f1e;border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:16px;font-size:13px;line-height:1.7;color:#cbd5e1;white-space:pre-wrap;max-height:420px;overflow-y:auto}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:#475569;border-bottom:1px solid rgba(255,255,255,.06)}
    td{padding:12px 14px;font-size:13px;color:#cbd5e1;border-bottom:1px solid rgba(255,255,255,.04)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    input,select,textarea{background:#0a0f1e;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e2e8f0;font-size:13px;padding:8px 12px;outline:none;transition:border-color .15s}
    input:focus,select:focus,textarea:focus{border-color:#6366f1}select option{background:#0a0f1e}
  </style>
</head>
<body class="min-h-screen text-slate-100">
<div class="flex h-screen overflow-hidden">
  <aside class="w-56 flex-shrink-0 flex flex-col" style="background:#0a0e1a;border-right:1px solid rgba(255,255,255,.06)">
    <div class="px-5 py-5 border-b" style="border-color:rgba(255,255,255,.06)">
      <div class="flex items-center gap-2.5">
        <div style="width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div><div class="text-xs font-bold text-white leading-none">PQRS AI</div><div class="text-xs mt-0.5" style="color:#6366f1">Projects Factory</div></div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard" class="sidebar-link {% block nav_dash %}{% endblock %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>{{ t.dashboard }}
      </a>
      <a href="/requests" class="sidebar-link {% block nav_req %}{% endblock %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>{{ t.requests }}
      </a>
    </nav>
    <div class="px-3 py-4 border-t space-y-2" style="border-color:rgba(255,255,255,.06)">
      <div class="flex items-center gap-2 px-3 py-2">
        <div style="width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">D</div>
        <span class="text-xs text-slate-400 truncate">Demo User</span>
      </div>
      <div class="flex gap-1.5 px-2">
        <a href="/lang/en" class="flex-1 text-center py-1 rounded text-xs font-medium transition-all {% if lang=='en' %}bg-indigo-600 text-white{% else %}text-slate-500 hover:text-slate-300{% endif %}">EN</a>
        <a href="/lang/es" class="flex-1 text-center py-1 rounded text-xs font-medium transition-all {% if lang=='es' %}bg-indigo-600 text-white{% else %}text-slate-500 hover:text-slate-300{% endif %}">ES</a>
      </div>
      <a href="/logout" class="sidebar-link text-red-400 hover:text-red-300">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>{{ t.sign_out }}
      </a>
    </div>
  </aside>
  <main class="flex-1 overflow-y-auto">{% block content %}{% endblock %}</main>
</div>
</body></html>
